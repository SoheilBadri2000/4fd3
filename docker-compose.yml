version: "3.8"

services:

  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  server:
    build: ./server
    env_file: ./server/.env
    environment:
      # Override the localhost values from .env with Docker service names
      MONGODB_URI: mongodb://mongodb:27017/medical-assistant
      FRONTEND_URL: http://localhost:3000
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
    restart: unless-stopped

  web:
    build: ./web
    environment:
      API_URL: http://server:3001
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo_data:
